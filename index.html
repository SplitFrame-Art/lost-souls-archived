<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ST_BLYTHE_ARCHIVE</title>

<style>
body {
    background: black;
    color: #dcdcdc;
    font-family: monospace;
    padding: 20px;
    text-align: center;
    overflow-x: hidden;
}

/* STATIC BACKGROUND */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
    opacity: 0.15;
    z-index: -1;
}

/* TITLE WITH VERTICAL GLITCH */
.title {
    font-size: 28px;
    position: relative;
    color: white;
}

.title::before,
.title::after {
    content: "Stitches in the Dark - Lost Souls";
    position: absolute;
    left: 0;
    width: 100%;
}

.title::before {
    top: -2px;
    color: cyan;
    opacity: 0.6;
}

.title::after {
    top: 2px;
    color: red;
    opacity: 0.6;
}

/* GLITCH BURST */
.glitching {
    animation: glitchY 0.15s;
}

@keyframes glitchY {
    0% { transform: translateY(2px); }
    50% { transform: translateY(-2px); }
    100% { transform: translateY(1px); }
}

/* LORE */
.lore {
    max-width: 500px;
    margin: 20px auto;
    color: #aaa;
}

/* CHARACTER LIST */
.character {
    cursor: pointer;
    margin: 8px;
    color: #00ff9f;
}

.character:hover {
    color: red;
}

/* PROFILE DISPLAY */
.profile {
    margin-top: 20px;
    display: none;
    border: 1px solid #444;
    padding: 15px;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
    background: rgba(20,20,20,0.7);
}

/* SILHOUETTE IMAGE */
.profile img {
    width: 120px;
    margin-bottom: 10px;
    filter: brightness(0) invert(1);
}

/* ERROR */
.error {
    color: red;
    display: none;
    margin-top: 15px;
}

/* FOOTER */
.footer {
    margin-top: 40px;
    color: red;
}
</style>
</head>

<body>

<h1 class="title" id="title">Stitches in the Dark - Lost Souls</h1>

<p class="lore">
Saint Blythe’s was never meant to heal.<br><br>
Subjects were altered. Rewritten.<br><br>
Some resisted.<br>
Some obeyed.<br>
Some… remember.
</p>

<hr>

<h3>INPATIENT FILES</h3>

<div class="character" onclick="loadProfile('patch')">▶ PATCH</div>
<div class="character" onclick="loadProfile('dottie')">▶ DOTTIE</div>
<div class="character" onclick="loadProfile('spindle')">▶ SPINDLE</div>
<div class="character" onclick="loadProfile('flicker')">▶ FLICKER</div>
<div class="character" onclick="loadProfile('blythe')">▶ DR. LORA BLYTHE</div>

<div class="character" onclick="locked()">▶ ROOK</div>
<div class="character" onclick="locked()">▶ SHADOW</div>

<div id="profileBox" class="profile"></div>
<div id="errorBox" class="error">AUTHORIZED PERSONNEL ONLY</div>

<div class="footer">
Split Frame Entertainment
</div>

<script>
const profiles = {
patch: {
name: "ST BLYTHE INPATIENT: PATCH",
img: "patch.png",
desc: "Primary subject. Displays leadership traits. Memory instability detected."
},
dottie: {
name: "ST BLYTHE INPATIENT: DOTTIE",
img: "dottie.png",
desc: "Emotional stabilizer. Sensory anomalies present."
},
spindle: {
name: "ST BLYTHE INPATIENT: SPINDLE",
img: "spindle.png",
desc: "Structural irregularities. Limb distortion increasing."
},
flicker: {
name: "ST BLYTHE INPATIENT: FLICKER",
img: "flicker.png",
desc: "Signal interference. Retains fragmented data."
},
blythe: {
name: "DR. LORA BLYTHE",
img: "blythe.png",
desc: "Lead director. Believes identity can be reconstructed."
}
};

function loadProfile(name) {
document.getElementById("errorBox").style.display = "none";

let p = profiles[name];
let box = document.getElementById("profileBox");

box.innerHTML = `
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.desc}</p>
`;

box.style.display = "block";
}

function locked() {
document.getElementById("profileBox").style.display = "none";
let error = document.getElementById("errorBox");

error.innerText = "AUTHORIZED PERSONNEL ONLY";
error.style.display = "block";
}

/* RANDOM GLITCH */
setInterval(() => {
let title = document.getElementById("title");
title.classList.add("glitching");

setTimeout(() => {
title.classList.remove("glitching");
}, 100);

}, 4000);
</script>

</body>
</html>
